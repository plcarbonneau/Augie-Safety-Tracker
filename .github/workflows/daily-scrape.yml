name: Daily Scrape

on:
  schedule:
    - cron: '0 0 * * *' # Runs at midnight UTC every day
  workflow_dispatch: # Allows you to run it manually via the 'Actions' tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          rm -f package-lock.json bun.lock
          npm install

      - name: Run Scraper
        run: node scripts/run-scrape.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/data/archivedData.json public/archivedData.json
          git commit -m "Auto-update safety logs: $(date +'%Y-%m-%d')"
          git push
